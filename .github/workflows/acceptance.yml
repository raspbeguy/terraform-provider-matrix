name: acceptance

on:
  schedule:
    # 03:17 UTC nightly — offset from the hour to dodge GitHub's cron spikes.
    - cron: '17 3 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  testacc:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Start Synapse
        run: docker compose -f ci/compose.synapse.yml up -d

      - name: Wait for Synapse
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8008/_matrix/client/versions >/dev/null 2>&1; then
              echo "Synapse is up"; exit 0
            fi
            sleep 2
          done
          echo "Synapse never came up"; exit 1

      - name: Register test user & fetch token
        id: register
        run: |
          docker compose -f ci/compose.synapse.yml exec -T synapse \
            register_new_matrix_user -u tf -p tfpass -a -c /data/homeserver.yaml http://localhost:8008
          TOKEN=$(curl -s -XPOST http://localhost:8008/_matrix/client/v3/login \
            -H 'Content-Type: application/json' \
            -d '{"type":"m.login.password","user":"tf","password":"tfpass"}' | jq -r .access_token)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          MATRIX_HOMESERVER_URL: http://localhost:8008
          MATRIX_ACCESS_TOKEN: ${{ steps.register.outputs.token }}
          MATRIX_USER_ID: "@tf:localhost"
        run: go test -v -timeout 25m ./internal/provider/... -run '^TestAcc'

      - name: Synapse logs on failure
        if: failure()
        run: docker compose -f ci/compose.synapse.yml logs synapse
